name: Applytics

on:
  schedule:
    # Times are UTC. Apple's prior-day report is usually ready by mid-morning
    # Pacific, so we try twice. GitHub may delay scheduled runs under load.
    - cron: "0 15 * * *"   # ~07:00 US Pacific
    - cron: "0 23 * * *"   # ~15:00 US Pacific
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch App Store stats and push to TRMNL
        run: python scripts/fetch_appstore.py
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_VENDOR_NUMBER: ${{ secrets.ASC_VENDOR_NUMBER }}
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
          # Optional overrides:
          # ASC_STOREFRONT: us
          # TOP_APPS: "6"
